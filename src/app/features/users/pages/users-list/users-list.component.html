@if (loading()) {
<div class="loading loadingUsers">
    <mat-spinner></mat-spinner>
</div>
} @else {
<table mat-table [dataSource]="users()" class="mat-elevation-z2">
    <ng-container matColumnDef="id">
        <mat-header-cell *matHeaderCellDef>ID</mat-header-cell>
        <mat-cell *matCellDef="let element">
            {{element.id}}
        </mat-cell>
    </ng-container>

    <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>NOMBRE</mat-header-cell>
        <mat-cell *matCellDef="let element">
            {{element.name}}
        </mat-cell>
    </ng-container>

    <ng-container matColumnDef="email">
        <mat-header-cell *matHeaderCellDef>CORREO</mat-header-cell>
        <mat-cell *matCellDef="let element">
            {{element.email}}
        </mat-cell>
    </ng-container>

    <ng-container matColumnDef="role">
        <mat-header-cell *matHeaderCellDef>ROL</mat-header-cell>
        <mat-cell *matCellDef="let element">
            {{element.role}}
        </mat-cell>
    </ng-container>

    <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef>ESTADO</mat-header-cell>
        <mat-cell *matCellDef="let element">
            {{element.status}}
        </mat-cell>
    </ng-container>

    <ng-container matColumnDef="createdAt">
        <mat-header-cell *matHeaderCellDef>FECHA DE CREACIÓN</mat-header-cell>
        <mat-cell *matCellDef="let element">
            {{element.createdAt}}
        </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>ACCIONES</mat-header-cell>
        <mat-cell *matCellDef="let element">
            {{element.actions}}
        </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
</table>
}
