@if (loading()) {
<app-spinner></app-spinner>
} @else {

<mat-card>
    <mat-card-header>
        <mat-card-title>Dashboard</mat-card-title>
        <mat-card-subtitle>Material 3 funciona</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        Este contenido esta usando angular material
    </mat-card-content>

    <mat-card-actions class="controlButton">
        <button mat-raised-button color="primary">
            <mat-icon>home</mat-icon>
            Inicio
        </button>

        <button mat-raised-button>
            <mat-icon>contact_mail</mat-icon>
            Productos
        </button>

    </mat-card-actions>
</mat-card>
}
